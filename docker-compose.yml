version: "3.8"

services:
  db:
    image: postgres:13
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: task_api_app_development
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
